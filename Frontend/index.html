<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Flask IMS - UI</title>
    <link rel="stylesheet" href="/frontend/style.css" />
  </head>
  <body>
    <main>
      <h1>Inventory</h1>

      <section id="create">
        <h2>Add Item</h2>
        <form id="create-form">
          <label>Name <input name="name" required /></label>
          <label>SKU <input name="sku" required /></label>
          <label>Quantity <input name="quantity" type="number" required /></label>
          <label>Price <input name="price" type="number" step="0.01" required /></label>
          <button type="submit">Add</button>
        </form>
      </section>

      <section id="list">
        <h2>Items</h2>
        <table id="items-table">
          <thead>
            <tr><th>ID</th><th>Name</th><th>SKU</th><th>Quantity</th><th>Price</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="/frontend/app.js"></script>
  </body>
</html>
